services:
  - type: web
    name: lucas-balaguer-portfolio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    pythonVersion: "3.11.9"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PANEL_TOKEN
        sync: false
      - key: PANEL_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
