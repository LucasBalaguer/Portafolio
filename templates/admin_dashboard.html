<h2>Panel Admin</h2>

<a href="{{ url_for('admin_logout') }}">Cerrar sesión</a>
<a href="{{ url_for('admin_create_project') }}">➕ Nuevo Proyecto</a>

<ul>
{% for project in projects %}
    <li>
        <strong>{{ project.title }}</strong>

        <a href="{{ url_for('admin_edit_project', id=project.id) }}">Editar</a>

        <form action="{{ url_for('admin_delete_project', id=project.id) }}" method="POST" style="display:inline;">
            <button type="submit">Eliminar</button>
        </form>
    </li>
{% endfor %}
</ul>
