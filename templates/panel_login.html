<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso restringido</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent-dim: rgba(124, 106, 247, 0.15);
            --text: #e2e2f0;
            --muted: #555570;
            --error: #f05e7a;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124,106,247,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            position: relative;
        }

        .lock-icon {
            font-size: 2rem;
            margin-bottom: 1.25rem;
            display: block;
            text-align: center;
        }

        h1 {
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            color: var(--text);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.72rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        input[type="password"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.25rem;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-family: var(--font);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.88; }
        button:active { transform: scale(0.98); }

        .flash-error {
            background: rgba(240, 94, 122, 0.1);
            border: 1px solid rgba(240, 94, 122, 0.3);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.78rem;
            padding: 0.6rem 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 6px;
            vertical-align: middle;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <span class="lock-icon">🔐</span>
        <h1><span class="dot"></span>Zona restringida</h1>
        <p class="subtitle">Acceso privado · Solo tú</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                <div class="flash-error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password"
                   placeholder="••••••••••••" autofocus required>
            <button type="submit">Entrar →</button>
        </form>
    </div>
</body>
</html>
